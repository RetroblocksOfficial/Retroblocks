<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retroblocks - Build & Share!</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #111;
            color: #33ff33;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px double #33ff33;
            width: 100%;
            max-width: 900px;
            padding-bottom: 10px;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 900px;
            gap: 20px;
            height: 500px;
        }
        #game-container {
            flex: 3;
            position: relative;
            border: 3px solid #33ff33;
            background: #000;
        }
        .sidebar {
            flex: 1;
            background-color: #1a1a1a;
            border: 3px solid #33ff33;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <header>
        <h1>▲ RETROBLOCKS ▲</h1>
        <p>Click the floor to build your world!</p>
    </header>

    <div class="container">
        <div id="game-container">
            <a-scene embedded style="width: 100%; height: 100%;">
                <a-sky color="#0a0a1a"></a-sky>
                
                <a-plane id="ground" class="clickable" position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#222" gridhelper="size: 50; divisions: 50; colorGrid: #33ff33"></a-plane>
                
                <a-entity camera look-controls wasd-controls="fly: false" position="0 1.6 3">
                    <a-cursor raycaster="objects: .clickable" color="#33ff33"></a-cursor>
                </a-entity>
            </a-scene>
        </div>

        <div class="sidebar">
            <div>
                <h3 style="margin-top: 0; border-bottom: 1px solid #33ff33; padding-bottom: 5px;">🔧 Tool Box</h3>
                <p>• Look around with your mouse.</p>
                <p>• Move with <strong>WASD</strong>.</p>
                <p>• Aim your crosshair at the floor and **Click** to place a block!</p>
            </div>
        </div>
    </div>

    <script>
        const colors = ['#ff3333', '#3333ff', '#ffff33', '#ff33ff', '#33ffff', '#33ff33'];
        const ground = document.getElementById('ground');
        const scene = document.querySelector('a-scene');

        // Listen for a click on the ground grid
        ground.addEventListener('click', function (evt) {
            // Get the exact coordinates of where the cursor clicked
            const intersection = evt.detail.intersection.point;
            
            // Snap coordinates to a grid system so blocks align perfectly
            const snapX = Math.round(intersection.x);
            const snapZ = Math.round(intersection.z);
            const snapY = 0.5; // Half the height of a 1x1x1 block so it sits perfectly on the ground

            // Create a brand new 3D box element
            const newBlock = document.createElement('a-box');
            newBlock.setAttribute('position', `${snapX} ${snapY} ${snapZ}`);
            
            // Pick a random color from our array
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            newBlock.setAttribute('color', randomColor);
            
            // Give it dimensions
            newBlock.setAttribute('width', '1');
            newBlock.setAttribute('height', '1');
            newBlock.setAttribute('depth', '1');

            // Add the new block into our 3D scene!
            scene.appendChild(newBlock);
        });
    </script>

</body>
</html>
